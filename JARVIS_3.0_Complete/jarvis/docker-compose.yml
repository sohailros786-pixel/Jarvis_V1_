version: "3.9"

services:
  jarvis:
    build: .
    container_name: jarvis-orchestrator
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Run Telegram bot in polling mode (alternative to webhook)
  jarvis-bot:
    build: .
    container_name: jarvis-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    command: python -m telegram.bot
    depends_on:
      - jarvis
